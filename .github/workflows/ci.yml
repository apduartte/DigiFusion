name: CI Terraform

on:
  pull_request:
    paths:
      - 'bia/infra/terraform/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bia/infra/terraform

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3️⃣ Terraform Init
      - name: Terraform Init
        run: terraform init -input=false

      # 4️⃣ Terraform Format
      - name: Terraform Fmt
        run: terraform fmt -check -diff

      # 5️⃣ Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # 6️⃣ Verificar arquivos
      - name: Check tfvars
        run: ls -la

      # 7️⃣ Terraform Plan
      - name: Terraform Plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

          TF_VAR_n8n_password: ${{ secrets.N8N_PASSWORD }}
          TF_VAR_environment: ${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}
          TF_VAR_vpc_cidr: 10.0.0.0/16
          TF_VAR_public_subnet_cidrs: '["10.0.1.0/24","10.0.2.0/24"]'
          TF_VAR_private_subnet_cidrs: '["10.0.10.0/24","10.0.11.0/24"]'
          TF_VAR_domain_name: example.com
          TF_VAR_ami_id: ami-1234567890

        run: terraform plan -input=false -no-color
