name: CI Terraform

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bia/infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Fmt
        run: terraform fmt -check -diff

      - name: Terraform Validate
        run: terraform validate

      - name: Check files
        run: ls -la

      - name: Terraform Plan
        env:
          TF_VAR_n8n_password: ${{ secrets.N8N_PASSWORD }}
          TF_VAR_environment: dev
          TF_VAR_vpc_cidr: 10.0.0.0/16
          TF_VAR_public_subnet_cidrs: '["10.0.1.0/24","10.0.2.0/24"]'
          TF_VAR_private_subnet_cidrs: '["10.0.10.0/24","10.0.11.0/24"]'
          TF_VAR_domain_name: example.com
          TF_VAR_ami_id: ami-1234567890
        run: terraform plan -input=false -no-color

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy (placeholder)
        run: echo "Deploy step here"