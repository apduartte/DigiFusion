name: CI/CD Multi-Environment

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: digifusion-bia
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build:
    name: Build & Package
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            -f bia/docker/Dockerfile ./bia

      - name: Export image name
        id: meta
        run: echo "image=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-dev:
    name: Deploy DEV
    needs: build
    runs-on: ubuntu-latest
    environment: DEV

    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:dev-$IMAGE_TAG

          docker push \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:dev-$IMAGE_TAG

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_DEV }} \
            --service ${{ secrets.ECS_SERVICE_DEV }} \
            --force-new-deployment

  deploy-staging:
    name: Deploy STAGING
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: STAGING

    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:staging-$IMAGE_TAG

          docker push \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:staging-$IMAGE_TAG

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_STAGING }} \
            --service ${{ secrets.ECS_SERVICE_STAGING }} \
            --force-new-deployment

  deploy-prod:
    name: Deploy PROD
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:prod-$IMAGE_TAG

          docker push \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:prod-$IMAGE_TAG

      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --service ${{ secrets.ECS_SERVICE_PROD }} \
            --force-new-deployment

      - name: Post deploy
        run: echo "[CI/CD] Deploy PROD concluído com sucesso"