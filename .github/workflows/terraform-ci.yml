name: Terraform CI

on:
  push:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_ROOT: infra/terraform/envs/model1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7   # versão LTS estável

      - name: Terraform fmt
        run: terraform -chdir=${{ env.TF_ROOT }} fmt -check -recursive

      - name: Terraform init (CI sem backend remoto)
        run: terraform -chdir=${{ env.TF_ROOT }} init -backend=false -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_ROOT }} validate

      - name: Terraform plan (dry-run)
        run: terraform -chdir=${{ env.TF_ROOT }} plan -input=false -lock=false -out=tfplan

      # Upload do plano como artefato para auditoria
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: ${{ env.TF_ROOT }}/tfplan

      # Upload de logs para rastreabilidade
      - name: Upload Terraform Logs
        uses: actions/upload-artifact@v3
        with:
          name: terraform-logs
          path: ${{ env.TF_ROOT }}/.terraform

