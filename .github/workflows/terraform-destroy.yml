name: Terraform Destroy

on:
  workflow_dispatch:   # execução manual

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production   # exige aprovação manual se configurado no GitHub Environments
    defaults:
      run:
        working-directory: ./infra/terraform/envs/model1
        shell: bash

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.7   # versão LTS estável
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init (com backend remoto)
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=model1/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (destroy)
        run: terraform plan -destroy -out=tfplan

      # Upload do plano como artefato para revisão/auditoria
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-destroy-plan
          path: tfplan

      # Aplicação só após aprovação manual via GitHub Environments
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

      - name: Verificação de recursos restantes
        run: |
          if [ -z "$(terraform state list)" ]; then
            echo "✅ Nenhum recurso ativo no estado Terraform."
          else
            echo "⚠️ Ainda existem recursos ativos:"
            terraform state list
            exit 1
          fi

      - name: Upload Terraform Logs
        uses: actions/upload-artifact@v3
        with:
          name: terraform-logs
          path: .terraform

