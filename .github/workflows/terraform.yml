name: 'Terraform'

on:
  push:
    branches: [ "main" ]   # ajuste se sua branch principal for "master"
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    environment: production   # exige aprovação manual se configurado no GitHub Environments

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: 1.14.7   # versão LTS estável

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      # Upload do plano como artefato para revisão/auditoria
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: tfplan

      # Aplicação só em push para main/master, com aprovação manual via GitHub Environments
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false tfplan

      # Upload de logs para auditoria
      - name: Upload Terraform Logs
        uses: actions/upload-artifact@v3
        with:
          name: terraform-logs
          path: .terraform

